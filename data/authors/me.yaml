bio: |
  Marco Scigliuzzo is Assistant Professor at the University of Sherbrooke,
  where he holds the Chair in Development of Quantum Technologies. His
  research explores superconducting quantum circuits, quantum acoustics,
  circuit optomechanics, and engineered microwave environments for quantum
  optics.

  His work has contributed to the control of photonic and phononic degrees of
  freedom at the quantum level, high-coherence superconducting devices,
  quantum acoustics with tunable nonlinearity, and collective quantum motion
  in mechanical resonator arrays.

